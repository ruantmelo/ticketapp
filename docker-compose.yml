services:
  redis:
    image: redis:7-alpine
    container_name: ticketapp-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: ticketapp-anvil
    ports:
      - "8545:8545"
    volumes:
      - ./.local-chain/anvil:/data
    entrypoint: ["sh", "-c"]
    command:
      - if [ -f /data/anvil-state.json ]; then anvil --host 0.0.0.0 --port 8545 --chain-id 31337 --load-state /data/anvil-state.json --dump-state /data/anvil-state.json --mnemonic "test test test test test test test test test test test junk"; else anvil --host 0.0.0.0 --port 8545 --chain-id 31337 --dump-state /data/anvil-state.json --mnemonic "test test test test test test test test test test test junk"; fi
    restart: unless-stopped
